<!DOCTYPE html>
<html>
<head>
  <title>Basketball Predictor</title>
</head>
<body>
  <h1>Score Predictor</h1>

  <form id="predictForm">
    Home Team: <input id="home"><br>
    Away Team: <input id="away"><br>
    Home Court?: <input id="home_court"><br>
    <button type="submit">Predict</button>
  </form>

  <pre id="result"></pre>

  <script>
    document.getElementById("predictForm").onsubmit = async (e) => {
      e.preventDefault();

      const home = home.value;
      const away = away.value;
      const home_court = home_court.value;

      const res = await fetch(
        `/predict?home=${home}&away=${away}&home_court=${home_court}`
      );

      document.getElementById("result").textContent =
        JSON.stringify(await res.json(), null, 2);
    };
  </script>
</body>
</html>
