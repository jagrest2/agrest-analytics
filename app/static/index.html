<!DOCTYPE html>
<html>
<head>
    <title>Agrest Analytics</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="images/Gemini_Generated_Image_bct4jzbct4jzbct4.ico">
</head>
<body>
    <div class="navbar">
        <img class = "logo" src = "images/ChatGPT Image Jun 9, 2026, 02_05_22 PM.png" alt = "Logo">
        <a href="table.html">NCAAM</a>
        <a href="index.html">Simulate</a>
        <a href="about.html">About</a>
    </div>
    <div class="container">
        <h1>CBB Matchup Engine</h1>
        
        <div>
            <label for="home-team">Home Team:</label>
            <select id="home-team">
                <option>Loading teams...</option>
            </select>
            
            <br>

            <label for="away-team">Away Team:</label>
            <select id="away-team">
                <option>Loading teams...</option>
            </select>

            <br>

            <label for="numberOfSims">Number of Games:</label>
            <input id="numberOfSims" type = "number" value = "100" min = "1" max = "500">
        </div>

        <div class="control-group" style="margin: 15px 0;">
            <input type="checkbox" id="home-court-checkbox" checked>
            <label for="home-court-checkbox">Home Court Advantage?</label>
        </div>

        <button type="button" onclick="handleSims()">Run Matchup</button>
        

        <div class="scoreboard">
            <h2 id="score-display">Select Teams to Begin</h2>
            <p id="series-history" style="text-align: center; font-size: 0.9rem; color: #666;"></p>
        </div>
            
            <div id="batch-container" style="display: none; margin-top: 20px; border-top: 1px dashed #ccc; padding-top: 15px;">
                <h3>Series Results</h3>
                <div style="display: flex; justify-content: space-around; text-align: center;">
                    <div>
                        <p><strong>Home Wins</strong></p>
                        <h4 id="batch-home-wins" style="font-size: 1.5rem; color: #2ecc71;">0</h4>
                        <p id="batch-home-avg" style="color: #666;">Avg: 0.0</p>
                    </div>
                    <div>
                        <p><strong>Away Wins</strong></p>
                        <h4 id="batch-away-wins" style="font-size: 1.5rem; color: #e74c3c;">0</h4>
                        <p id="batch-away-avg" style="color: #666;">Avg: 0.0</p>
                    </div>
                </div>
            </div>
    </div>

    <script>
        async function loadTeams() {
            try {
                const response = await fetch('/teams');
                const data = await response.json();
                const teams = data.teams;

                const homeSelect = document.getElementById('home-team');
                const awaySelect = document.getElementById('away-team');

                homeSelect.innerHTML = '';
                awaySelect.innerHTML = '';

                teams.forEach(team => {
                    let opt1 = document.createElement('option');
                    let opt2 = document.createElement('option');
                    
                    opt1.value = team;
                    opt1.text = team;
                    opt2.value = team;
                    opt2.text = team;

                    homeSelect.add(opt1);
                    awaySelect.add(opt2);
                });
            } catch (error) {
                console.error("Failed to load teams:", error);
            }
        }

        window.onload = loadTeams;

        function handleSims() {
            // Get the input element and convert its value to a number
            const inputField = document.getElementById('numberOfSims');
            const numberOfSims = parseInt(inputField.value, 10);

            // 2. The Conditional Logic
            if (numberOfSims === 1) {
                runSimulation();
            } else if (numberOfSims >= 2) {
                runBatchSimulation(numberOfSims);
            } else {
                console.log("Please enter a number of 1 or greater.");
            }
        }

        async function runSimulation() {
            console.log("Starting Simulation...");

            // 1. Get UI Elements
            const scoreHeader = document.getElementById('score-display');
            const historyLabel = document.getElementById('series-history');

            // 2. Get Selection Data
            const homeSelect = document.getElementById('home-team');
            const awaySelect = document.getElementById('away-team');

            const homeName = homeSelect.options[homeSelect.selectedIndex].text;
            const awayName = awaySelect.options[awaySelect.selectedIndex].text;
            const homeVal = homeSelect.value;
            const awayVal = awaySelect.value;

            scoreHeader.innerText = "Simulating...";
            if (historyLabel) historyLabel.innerText = ""; 

            try {
                // FIX: Added &home_court=false explicitly to the URL string so FastAPI doesn't crash
                const response = await fetch(`/simulate?home=${encodeURIComponent(homeVal)}&away=${encodeURIComponent(awayVal)}&home_court=false`);
                
                if (!response.ok) throw new Error("Server returned a bad status code");
                
                const data = await response.json();

                // 3. Update the Scoreboard with Team Names and Scores
                scoreHeader.innerText = `${homeName} ${data.home_score} - ${awayName} ${data.away_score}`;

                // 4. Update the History Record
                if (historyLabel && data.total_sims && data.series_record) {
                    historyLabel.innerText = `Series History (${data.total_sims} sims): ${data.series_record}`;
                }

            } catch (error) {
                console.error("Simulation failed:", error);
                scoreHeader.innerText = "Error: Check your server logs";
            }
        }

        async function runBatchSimulation() {
            console.log("Starting Batch Simulation...");

            const scoreHeader = document.getElementById('score-display');
            const batchContainer = document.getElementById('batch-container');
            
            const homeSelect = document.getElementById('home-team');
            const awaySelect = document.getElementById('away-team');
            const isHomeCourt = document.getElementById('home-court-checkbox').checked;

            const simsInput = document.getElementById('numberOfSims');
            // Default to 100 if the input is empty or invalid
            const totalGames = simsInput && simsInput.value ? parseInt(simsInput.value, 10) : 100;

            const homeName = homeSelect.options[homeSelect.selectedIndex].text;
            const awayName = awaySelect.options[awaySelect.selectedIndex].text;
            const homeVal = homeSelect.value;
            const awayVal = awaySelect.value;

            batchContainer.style.display = 'none'; // Hide old batch results while loading

            try {
                // --- 2. ADD THE GAMES PARAMETER TO THE FETCH URL ---
                // Everything in one go
                const response = await fetch(`/batch?home=${encodeURIComponent(homeVal)}&away=${encodeURIComponent(awayVal)}&home_court=${isHomeCourt}&games=${totalGames}`);
                
                if (!response.ok) throw new Error("Server error");
                
                const data = await response.json();

                // 1. Update main header to show the breakdown summary
                scoreHeader.innerText = `${homeName} Wins: ${data.home_wins} | ${awayName} Wins: ${data.away_wins}`;

                // 2. Populate and unhide the comprehensive batch breakdown panel
                document.getElementById('batch-home-wins').innerText = `${data.home_wins} Games`;
                document.getElementById('batch-away-wins').innerText = `${data.away_wins} Games`;
                document.getElementById('batch-home-avg').innerText = `Avg Score: ${data.avg_home_score}`;
                document.getElementById('batch-away-avg').innerText = `Avg Score: ${data.avg_away_score}`;
                
                batchContainer.style.display = 'block';

            } catch (error) {
                console.error("Batch simulation failed:", error);
                scoreHeader.innerText = "Error: Check your server logs";
            }
        }
    </script>
</body>
</html>
