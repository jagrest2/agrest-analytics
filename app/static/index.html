<!DOCTYPE html>
<html>
<head>
    <title>Agrest Analytics | CBB Sim</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>CBB Matchup Engine</h1>
        
        <div class="input-section">
            <select id="home-team">
                <option value="Illinois">Illinois</option>
            </select>
            
            <span>VS</span>
            
            <select id="away-team">
                <option value="Purdue">Purdue</option>
            </select>
        </div>

        <button type="button" onclick="runSimulation()">Run Matchup</button>

        <div id="scoreboard">
            <h2 id="score-display">00 - 00</h2>
            <div id="log-container"></div>
        </div>
    </div>
    <script>
    async function runSimulation() {
        alert("The button is connected!");
        console.log("1. Button Clicked");
        
        const homeTeam = document.getElementById('home-team').value;
        const awayTeam = document.getElementById('away-team').value;
        
        console.log(`2. Attempting to fetch: /simulate?home=${homeTeam}&away=${awayTeam}`);

        try {
            const response = await fetch(`/simulate?home=${homeTeam}&away=${awayTeam}`);
            
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }

            const data = await response.json();
            console.log("3. Data received successfully:", data);

            // Update the Score
            document.getElementById('score-display').innerText = `${data.home_score} - ${data.away_score}`;

            // Update the Log
            const logContainer = document.getElementById('log-container');
            logContainer.innerHTML = data.log.map(line => `<p>${line}</p>`).join('');
            
            console.log("4. UI Update Complete");

        } catch (error) {
            console.error("FATAL ERROR in simulation:", error);
            document.getElementById('score-display').innerText = "Simulation Failed. Check Console.";
        }
}
    </script>
</body>
</html>
