<!DOCTYPE html>
<html>
<head>
    <title>Agrest Analytics | CBB Sim</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>CBB Matchup Engine</h1>
        
        <div>
            <label for="home-team">Home Team:</label>
            <select id="home-team">
                <option>Loading teams...</option>
            </select>

            <label for="away-team">Away Team:</label>
            <select id="away-team">
                <option>Loading teams...</option>
            </select>
        </div>

        <div class="control-group">
            <input type="checkbox" id="show-log-checkbox" checked>
            <label for="show-log-checkbox">Show Play-by-Play Log</label>
        </div>

        <button type="button" onclick="runSimulation()">Run Matchup</button>

        <div class="scoreboard">
            <h2 id="score-display">Select Teams to Begin</h2>
            <p id="series-history" style="text-align: center; font-size: 0.9rem; color: #666;"></p>
            <div id="log-container"></div>
        </div>
    </div>
    <script>
    
            // This function runs the moment the page loads
        async function loadTeams() {
            try {
                const response = await fetch('/teams');
                const data = await response.json();
                const teams = data.teams;

                const homeSelect = document.getElementById('home-team');
                const awaySelect = document.getElementById('away-team');

                // Clear the "Loading..." message
                homeSelect.innerHTML = '';
                awaySelect.innerHTML = '';

                // Loop through the 365 teams and create an option for each
                teams.forEach(team => {
                    let opt1 = document.createElement('option');
                    let opt2 = document.createElement('option');
                    
                    opt1.value = team;
                    opt1.text = team;
                    opt2.value = team;
                    opt2.text = team;

                    homeSelect.add(opt1);
                    awaySelect.add(opt2);
                });

                console.log("365 teams loaded successfully!");

            } catch (error) {
                console.error("Failed to load teams:", error);
            }
        }

        // Trigger the load
        window.onload = loadTeams;

        async function runSimulation() {
                console.log("Starting Simulation...");

                // 1. Get UI Elements
                const scoreHeader = document.getElementById('score-display');
                const logContainer = document.getElementById('log-container');
                const showLog = document.getElementById('show-log-checkbox').checked;

                // 2. Get Selection Data
                const homeSelect = document.getElementById('home-team');
                const awaySelect = document.getElementById('away-team');

                // Get the Names (e.g., "Illinois") and Values (e.g., "illinois_stats")
                const homeName = homeSelect.options[homeSelect.selectedIndex].text;
                const awayName = awaySelect.options[awaySelect.selectedIndex].text;
                const homeVal = homeSelect.value;
                const awayVal = awaySelect.value;

                scoreHeader.innerText = "Simulating...";

                try {
                    // 3. Fetch from Python Backend
                    const response = await fetch(`/simulate?home=${homeVal}&away=${awayVal}`);
                    
                    if (!response.ok) throw new Error("Server error");
                    
                    const data = await response.json();

                    // 4. Update the Scoreboard with Team Names
                    // This is the line that brings the names back!
                    scoreHeader.innerText = `${homeName} ${data.home_score} - ${awayName} ${data.away_score}`;

                    const historyLabel = document.getElementById('series-history');
                    historyLabel.innerText = `Series History (${data.total_sims} sims): ${data.series_record}`;

                    // 5. Update the Log (with safety checks)
                    if (showLog && data.log && Array.isArray(data.log)) {
                        logContainer.style.display = 'block';
                        logContainer.innerHTML = data.log.map(line => `<p class="log-line">${line}</p>`).join('');
                    } else {
                        logContainer.style.display = 'none';
                        logContainer.innerHTML = '';
                    }

                } catch (error) {
                    console.error("Simulation failed:", error);
                    scoreHeader.innerText = "Error: Check your server logs";
                }
            }
    </script>
</body>
</html>
