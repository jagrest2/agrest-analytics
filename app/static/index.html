<!DOCTYPE html>
<html>
<head>
    <title>Agrest Analytics | CBB Sim</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>CBB Matchup Engine</h1>
        
        <div class="input-section">
            <select id="home-team">
                <option value="Illinois">Illinois</option>
            </select>
            
            <span>VS</span>
            
            <select id="away-team">
                <option value="Purdue">Purdue</option>
            </select>
        </div>

        <button type="button" onclick="runSimulation()">Run Matchup</button>

        <div class="scoreboard">
            <h2 id="score-display">Select Teams to Begin</h2>
            <div id="game-log"></div>
        </div>
    </div>
    <script>
    async function runSimulation() {
        // 1. UI Elements - Grabbing the "Scoreboard" and "Log" spots
        const scoreHeader = document.getElementById('score-display');
        const logContainer = document.getElementById('game-log');
        
        // 2. Input Data - Grabbing team names and values
        const homeSelect = document.getElementById('home-team');
        const awaySelect = document.getElementById('away-team');
        
        const homeTeamValue = homeSelect.value;
        const awayTeamValue = awaySelect.value;
        
        // Get the actual names (e.g., "Illinois") for the display
        const homeName = homeSelect.options[homeSelect.selectedIndex].text;
        const awayName = awaySelect.options[awaySelect.selectedIndex].text;

        // 3. Loading State - Let the user know the engine is starting
        scoreHeader.innerText = "Simulating Game...";
        logContainer.innerHTML = "<p>Crunching numbers...</p>";

        try {
            // 4. The API Call - Works on both Localhost and Render
            const response = await fetch(`/simulate?home=${homeTeamValue}&away=${awayTeamValue}`);
            
            if (!response.ok) {
                throw new Error(`Server Error: ${response.status}`);
            }

            const data = await response.json();

            // 5. Update Scoreboard - "Team A 80 - Team B 75"
            scoreHeader.innerText = `${homeName} ${data.home_score} - ${awayName} ${data.away_score}`;

            // 6. Update Play-by-Play - Mapping the list to HTML paragraphs
            // Note: Using 'data.log' to match your Python dictionary key
            logContainer.innerHTML = data.log.map(line => `<p class="log-line">${line}</p>`).join('');

            // 7. Optional: Auto-scroll to the top of the log
            logContainer.scrollTop = 0;

        } catch (error) {
            console.error("Simulation Error:", error);
            scoreHeader.innerText = "Error Running Matchup";
            logContainer.innerHTML = `<p style="color: red;">Error: ${error.message}. Check your terminal logs.</p>`;
        }   
}
    </script>
</body>
</html>
