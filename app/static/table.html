<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agrest Analytics | Team Efficiency Ratings</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <style>
        body { background-color: silver; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { background-color: #1e1e1e; border: 1px solid #2d2d2d; border-radius: 8px; }
        
        /* DataTables Custom Overrides for Premium Dark UI */
        .table { color: #e0e0e0 !important; border-color: #2d2d2d; }
        .table-striped tbody tr:nth-of-type(odd) { background-color: green; }
        .table-striped tbody tr:nth-of-type(even) { background-color: orange; }
        .table-hover tbody tr:hover { background-color: #252525; color: #fff !important; }
        thead { background-color: #0d6efd; color: #fff; }
        
        /* Fixing search filters/pagination styling layout to match dark theme */
        .dataTables_wrapper .dataTables_length select,
        .dataTables_wrapper .dataTables_filter input {
            background-color: wheat;
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
            padding: 4px 8px;
        }
        .page-link { background-color: wheat; border-color: #2d2d2d; color: #0d6efd; }
        .page-item.active .page-link { background-color: #0d6efd; border-color: #0d6efd; color: #fff; }
    </style>
</head>
<body>
    <div class="navbar">
        <img class = "logo" src = "images/ChatGPT Image Jun 9, 2026, 02_05_22 PM.png" alt = "Logo">
        <a href="table.html">NCAAM</a>
        <a href="index.html">Simulate</a>
        <a href="about.html">About</a>
    </div>
    <div class="container-fluid px-4 py-5">
        <div class="container">
            <h1>2026 Agrest Analytics Efficiencies</h1>
        </div>

        <div class="card p-4 shadow-sm">
            <div class="table-responsive">
                <table id="efficiencyTable" class="table table-striped table-hover align-middle w-100">
                    </table>
            </div>
        </div>
    </div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

<script>
$(document).ready(function() {
    fetch('/api/efficiencies')
    .then(response => response.json())
    .then(rawData => {
        if (!rawData?.length) {
            $('#efficiencyTable').html('<p class=" text-ceter text-danger p-3">No data records found.</p>');
            return;
        }

        // 1. Build rapid lookup map for stats
        const teamLookup = {};
        rawData.forEach(t => {
            if (t.Team) {
                teamLookup[t.Team] = {
                    Net: parseFloat(t.Net || 0),
                    Off: parseFloat(t.Offensive || t.OffEff || t.Off || 0),
                    Def: parseFloat(t.Defensive || t.DefEff || t.Def || 0)
                };
            }
        });

        // 2. Calculate SOS Metrics (Returns 0.00 if names do not match database)
        rawData.forEach(t => {
            let totalNet = 0, totalOff = 0, totalDef = 0, count = 0;

            (t.Opponents || []).forEach(oppName => {
                const opp = teamLookup[oppName];
                if (opp) { 
                    totalNet += opp.Net;
                    totalOff += opp.Off;
                    totalDef += opp.Def;
                    count++;
                }
            });

            // Diagnostic indicator: outputs 0.00 if matchups or names are broken
            t.Net_SOS = count > 0 ? (totalNet / count).toFixed(2) : "0.00";
            t.Off_SOS = count > 0 ? (totalOff / count).toFixed(2) : "0.00";
            t.Def_SOS = count > 0 ? (totalDef / count).toFixed(2) : "0.00";
        });

        // 3. Pre-sort array by Net Rating descending
        rawData.sort((a, b) => parseFloat(b.Net || 0) - parseFloat(a.Net || 0));

        // 4. Map Table Columns dynamically
        // 4. Map Table Columns dynamically (Updated for Clickable Conferences)
        // 4. Map Table Columns dynamically (Updated for Links & Strict 2-Decimal Display)
        const columns = Object.keys(rawData[0])
            .filter(key => key !== 'Opponents')
            .map(key => {
                let customRender = undefined;

                if (key === "Team") {
                    customRender = (data, type) => 
                        (type === 'display' && data) ? `<a href="/team?name=${encodeURIComponent(data)}" class="text-decoration-none fw-bold" style="color: #0d6efd;">${data}</a>` : data;
                } 
                else if (key === "Conference") {
                    customRender = (data, type) => 
                        (type === 'display' && data) ? `<a href="conference.html?conf=${encodeURIComponent(data)}" class="text-decoration-none fw-bold" style="color: #0d6efd;">${data}</a>` : data;
                } 
                else {
                    // This forces every other column (Net, Off, Def, Possessions) to 2 decimals safely
                    customRender = (data, type) => {
                        if (type === 'display' && data !== undefined && data !== null && !isNaN(data)) {
                            return parseFloat(data).toFixed(2);
                        }
                        return data; // Keeps raw floats behind the scenes so sorting doesn't break!
                    };
                }

                return {
                    data: key,
                    title: key.replace(/_/g, ' '),
                    render: customRender
                };
            });

        // Insert Rank column at index 0
        columns.unshift({
            data: null,
            title: "Rank",
            render: (data, type, row, meta) => meta.row + 1
        });

        // 5. Initialize DataTables engine
        $('#efficiencyTable').DataTable({
            data: rawData,
            columns: columns,
            paging: false,                 
            scrollCollapse: true,   
            responsive: true,
            order: [[3, 'desc']], 
            dom: "<'row mb-2'<'col-md-6'i><'col-md-6 d-flex justify-content-md-end'f>><'row'<'col-sm-12'tr>>",
            language: { search: "", searchPlaceholder: "🔍 Search teams" }
        });
    })
    .catch(err => {
        console.error('Error loading data:', err);
        $('#efficiencyTable').html('<p class="text-center text-danger p-3">Failed to load data.</p>');
    });
});
</script>
</body>
</html>
